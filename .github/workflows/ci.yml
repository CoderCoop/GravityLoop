name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  levels-solvable:
    name: All levels winnable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Brute-force solver over every level
        run: node tools/solve.js
